version: "0.5"

# Devbox services definition. Started with `devbox services up`.
#
# Postgres and the `typegen` watcher inherit env vars from the surrounding
# `devbox shell` (PGDATA, PGHOST, PGPORT, etc.).
#
# The `backend` and `frontend` processes get their application secrets
# (DB_*, CORS_ORIGINS, BACKEND_ORIGIN, ...) from Doppler via `doppler run`,
# using the per-directory scopes defined in `.doppler.yaml` at the repo
# root. Contributors must run `doppler login` and `doppler setup` once
# before `devbox services up` will succeed.

processes:
  postgres:
    command: postgres -D "$PGDATA" -k "$PGHOST" -p "$PGPORT"
    availability:
      restart: on_failure
    readiness_probe:
      exec:
        command: pg_isready -h localhost -p "$PGPORT" -U postgres
      initial_delay_seconds: 1
      period_seconds: 2
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 10
    shutdown:
      signal: 2
      timeout_seconds: 10

  backend:
    # Secrets (DB_*, CORS_ORIGINS, ...) are injected by `doppler run`, which
    # reads the project/config pinned for ./backend in ../.doppler.yaml.
    command: doppler run -- uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    working_dir: ./backend
    depends_on:
      postgres:
        condition: process_healthy
    availability:
      restart: on_failure

  frontend:
    # BACKEND_ORIGIN (and any future frontend secrets) come from Doppler
    # via the scope pinned for ./frontend in ../.doppler.yaml.
    command: doppler run -- pnpm dev --port 3000
    working_dir: ./frontend
    depends_on:
      backend:
        condition: process_started
    availability:
      restart: on_failure

  # Watches backend/app/**/*.py and regenerates:
  #   1. openapi.json                         (via `python -m app.scripts.dump_openapi`)
  #   2. frontend/src/lib/api-types.ts        (via `openapi-typescript`)
  # This gives the TypeScript language server real-time updates on
  # backend schema changes, so IDE red squiggles appear within ~1 s
  # of saving a Python file.
  typegen:
    command: uv run watchfiles --filter python "sh -c 'python -m app.scripts.dump_openapi > ../openapi.json && (cd ../frontend && pnpm exec openapi-typescript ../openapi.json -o src/lib/api-types.ts)'" app
    working_dir: ./backend
    availability:
      restart: on_failure
