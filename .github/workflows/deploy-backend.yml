name: Deploy backend

# Production deploy for the FastAPI backend.
#
# Runs on every push to main that touches backend/** (or this workflow
# itself). Two sequential steps:
#
#   1. alembic upgrade head  — against Neon, via doppler run + the prd
#                              config. Fails fast before we push an image
#                              that would talk to a schema-stale DB.
#   2. flyctl deploy         — builds the backend Dockerfile remotely and
#                              rolls the new image into the Fly machine.
#
# We deliberately do NOT run migrations as a Fly `release_command` (leaves
# half-deployed state on failure) or as a Terraform `null_resource`
# (couples schema changes to infra applies).
#
# Secrets (GitHub repository secrets):
#   DOPPLER_TOKEN_PRD        — Doppler service token for yata/prd config
#                              (DB creds for migrations)
#   DOPPLER_TOKEN_TERRAFORM  — Doppler service token for yata/terraform
#                              config (FLY_API_TOKEN for flyctl deploy)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

# Only one deploy in flight at a time; do not cancel an in-progress deploy
# because that can leave Fly half-rolled. Queue instead.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

permissions:
  contents: read

# Version pins mirror .github/workflows/ci.yml. Keep in sync.
env:
  PYTHON_VERSION: "3.12"
  FLY_APP_NAME: yata-backend-prd

jobs:
  migrate:
    name: Apply migrations (alembic → Neon)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Alembic upgrade head
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: doppler run -- uv run alembic upgrade head

  deploy:
    name: Deploy to Fly.io
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: flyctl deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_TERRAFORM }}
        # doppler run injects FLY_API_TOKEN from the yata/terraform
        # config; flyctl reads it automatically. --remote-only builds
        # on Fly's builder instead of in the runner. App config
        # (region, VM size, ports) lives in backend/fly.toml.
        working-directory: backend
        run: doppler run -- flyctl deploy --remote-only
